version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    versioning-strategy: increase-if-necessary
    groups:
      cypress:
        patterns:
          - "cypress"
          - "@cypress*"
      storybook:
        patterns:
          - "storybook"
          - "@storybook*"
          - "*storybook"
      turf:
        patterns:
          - "@turf*"
      typescript:
        patterns:
          - "typescript"
          - "@types*"
      vega:
        patterns:
          - "vega"
          - "vega-*"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
